<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Speech Guidance - Gemini Mode</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1a2847;
            --accent: #4f46e5;
            --accent-light: #6366f1;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #1e293b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* ==================== HEADER ==================== */
        .header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }

        .title-group h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .title-group p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ==================== MAIN CONTENT ==================== */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* ==================== MESSAGE STYLES ==================== */
        .message {
            display: flex;
            gap: 12px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .message.user .message-avatar {
            background: var(--accent);
        }

        .message.ai .message-avatar {
            background: rgba(79, 70, 229, 0.2);
            border: 1px solid var(--accent);
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
        }

        .message.user .message-content {
            background: var(--accent);
            color: white;
            border-radius: 12px 4px 12px 12px;
        }

        .message.ai .message-content {
            background: var(--secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px 12px 12px 12px;
        }

        .message.system .message-content {
            background: rgba(15, 172, 181, 0.1);
            border: 1px solid rgba(15, 172, 181, 0.3);
            color: #06b6d4;
            margin: 0 auto;
            max-width: 90%;
            text-align: center;
        }

        /* ==================== STREAMING RESPONSE ==================== */
        .streaming-chunk {
            display: inline;
            word-wrap: break-word;
        }

        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent);
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* ==================== SUGGESTIONS ==================== */
        .suggestions-panel {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .suggestion-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: rgba(79, 70, 229, 0.1);
            color: var(--accent-light);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            background: rgba(79, 70, 229, 0.2);
            border-color: var(--accent);
        }

        /* ==================== INPUT AREA ==================== */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
        }

        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .transcript-display {
            flex: 1;
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            min-height: 42px;
            max-height: 100px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
        }

        .mic-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .mic-btn:hover {
            background: var(--accent-light);
            transform: scale(1.05);
        }

        .mic-btn.recording {
            background: #ef4444;
            animation: pulse-record 1s infinite;
        }

        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }

        /* ==================== CONTROLS ==================== */
        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toggle-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
        }

        .toggle-btn:hover {
            background: var(--secondary);
            color: var(--text-primary);
        }

        .toggle-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ==================== LOADING STATE ==================== */
        .loading {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .loading-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .message-content {
                max-width: 100%;
            }

            .header {
                flex-wrap: wrap;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="logo">🎤</div>
                <div class="title-group">
                    <h1>Speech Guidance</h1>
                    <p>Real-time AI assistance</p>
                </div>
            </div>
            <div class="header-right">
                <div class="status-dot"></div>
                <div class="status-text">Connected</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main">
            <div class="chat-area">
                <div class="messages" id="messages"></div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-group">
                        <div class="transcript-display" id="transcript">Ready to listen...</div>
                        <button class="mic-btn" id="micBtn" title="Start/Stop Recording">🎙️</button>
                        <div class="controls">
                            <button class="toggle-btn active" id="ttsBtn" title="Toggle Text-to-Speech">🔊</button>
                            <button class="toggle-btn active" id="educationBtn" title="Toggle Education Mode">📚</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let isRecording = false;
        let ttsEnabled = true;
        let educationEnabled = true;

        // ==================== MESSAGE HANDLING ====================
        function addMessage(text, type = 'ai') {
            const messagesDiv = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${type}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = type === 'user' ? '👤' : '✨';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            messageEl.appendChild(avatar);
            messageEl.appendChild(content);
            messagesDiv.appendChild(messageEl);
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return content;
        }

        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const messageEl = document.createElement('div');
            messageEl.className = 'message system';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            messageEl.appendChild(content);
            messagesDiv.appendChild(messageEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // ==================== SOCKET.IO HANDLERS ====================
        socket.on('connect', () => {
            document.querySelector('.status-dot').style.background = 'var(--success)';
        });

        socket.on('disconnect', () => {
            document.querySelector('.status-dot').style.background = '#ef4444';
        });

        socket.on('transcript', (data) => {
            document.getElementById('transcript').innerHTML = `<strong>You:</strong> ${data.text}`;
        });

        socket.on('status', (data) => {
            const messagesDiv = document.getElementById('messages');
            
            if (data.state === 'listening') {
                document.getElementById('transcript').textContent = '🎤 Listening...';
            } else if (data.state === 'processing') {
                addSystemMessage('⏳ Processing your speech...');
            }
        });

        // ==================== STREAMING RESPONSE ====================
        let currentResponseElement = null;

        socket.on('stream_start', (data) => {
            const content = addMessage('', 'ai');
            currentResponseElement = content;
            const section = data.section || 'Response';
            content.innerHTML = `<strong>${section}</strong><br>`;
        });

        socket.on('stream_token', (data) => {
            if (currentResponseElement) {
                const token = data.token;
                const span = document.createElement('span');
                span.className = 'streaming-chunk';
                span.textContent = token;
                currentResponseElement.appendChild(span);
                
                // Auto-scroll to latest
                document.getElementById('messages').scrollTop = 
                    document.getElementById('messages').scrollHeight;
            }
        });

        socket.on('stream_end', () => {
            if (currentResponseElement) {
                // Remove cursor if exists
                const cursor = currentResponseElement.querySelector('.cursor-blink');
                if (cursor) cursor.remove();
            }
            currentResponseElement = null;
        });

        socket.on('response', (data) => {
            const messagesDiv = document.getElementById('messages');
            const content = messagesDiv.lastChild?.querySelector('.message-content');
            
            if (content && data.suggestions && data.suggestions.length > 0) {
                const suggestionsDiv = document.createElement('div');
                suggestionsDiv.className = 'suggestions-panel';
                
                data.suggestions.forEach(suggestion => {
                    const btn = document.createElement('button');
                    btn.className = 'suggestion-btn';
                    btn.textContent = suggestion;
                    btn.onclick = () => {
                        addMessage(suggestion, 'user');
                        socket.emit('suggestion_selected', { text: suggestion });
                    };
                    suggestionsDiv.appendChild(btn);
                });
                
                content.appendChild(suggestionsDiv);
            }
        });

        socket.on('learning_insights', (data) => {
            if (data.vocabulary && data.vocabulary.length > 0) {
                const vocabText = data.vocabulary
                    .map(v => `<strong>${v.term}</strong>: ${v.definition}`)
                    .join('<br>');
                const content = addMessage(vocabText, 'ai');
            }
        });

        socket.on('error', (data) => {
            addSystemMessage(`⚠️ Error: ${data.message}`);
        });

        // ==================== UI CONTROLS ====================
        document.getElementById('micBtn').addEventListener('click', () => {
            isRecording = !isRecording;
            const btn = document.getElementById('micBtn');
            btn.classList.toggle('recording', isRecording);
            socket.emit('mic_toggle', { recording: isRecording });
        });

        document.getElementById('ttsBtn').addEventListener('click', (e) => {
            ttsEnabled = !ttsEnabled;
            e.target.classList.toggle('active', ttsEnabled);
            socket.emit('toggle_tts', { enabled: ttsEnabled });
        });

        document.getElementById('educationBtn').addEventListener('click', (e) => {
            educationEnabled = !educationEnabled;
            e.target.classList.toggle('active', educationEnabled);
            socket.emit('toggle_educational', { enabled: educationEnabled });
        });

        // Initial message
        addSystemMessage('👋 Connected! Click the microphone to start speaking.');
    </script>
</body>
</html>
