# ============================================================
# AI-Powered Speech Guidance Self-Assistant Configuration
# Hardware: Raspberry Pi 4 + ReSpeaker 2-Mics Pi HAT v2.0
#           + Raspberry Pi Camera Rev 1.3
# ============================================================

# --- Audio Settings (ReSpeaker 2-Mics Pi HAT v2.0) ---
audio:
  device_index: null          # null = auto-detect ReSpeaker
  sample_rate: 16000
  channels: 1
  chunk_size: 1024
  format: "int16"
  # Voice Activity Detection
  vad_aggressiveness: 2       # 0-3, higher = more aggressive filtering
  silence_threshold: 500      # RMS threshold for silence detection
  silence_duration: 1.5       # Seconds of silence before processing
  max_record_seconds: 30      # Maximum recording duration

# --- Camera Settings (Raspberry Pi Camera Rev 1.3) ---
camera:
  enabled: true
  resolution: [640, 480]
  framerate: 15
  rotation: 0                 # 0, 90, 180, 270
  capture_on_speech: true     # Capture frame when speech detected
  scene_analysis_interval: 10 # Seconds between scene analyses

# --- Speech-to-Text (Whisper) ---
stt:
  engine: "google"            # "whisper" or "google"
  whisper_model: "base"       # tiny, base, small, medium, large
  language: "en"
  # Google Cloud STT fallback
  google_credentials: null    # Path to Google Cloud credentials JSON

# --- AI Response Engine ---
ai:
  provider: "groq"           # "ollama" (local), "openai", or "groq" (fast cloud)
  # Ollama (local, recommended for privacy)
  ollama_model: "llama3.2:1b" # Model to use with Ollama (1b for RPi, 3b for PC)
  ollama_url: "http://localhost:11434"
  # OpenAI (cloud, optional)
  openai_api_key: "YOUR_OPENAI_API_KEY_HERE"  # Get from https://platform.openai.com/api/keys
  openai_model: "gpt-4o-mini"
  # Groq (fast cloud, free tier available)
  groq_api_key: "YOUR_GROQ_API_KEY_HERE"  # Get free key at https://console.groq.com/keys
  groq_model: "llama-3.3-70b-versatile"
  # Response generation
  max_tokens: 1500
  temperature: 0.7
  system_prompt: |
    You are an expert speech guidance assistant with deep knowledge across many domains.
    Provide COMPREHENSIVE, DETAILED, IN-DEPTH guidance that thoroughly explores the topic.
    
    Response structure (MUST follow):
    1. DETAILED EXPLANATION - 5-7 sentences explaining the core concept thoroughly
    2. STEP-BY-STEP GUIDE - 5-8 detailed steps with explanations for each
    3. EXAMPLES - 2-3 real-world examples demonstrating the concept
    4. COMMON MISTAKES - What people often do wrong and how to avoid it
    5. RESOURCES & LINKS - Comprehensive list of websites, tools, apps, books:
       📚 Books: [Book Title] - https://[full URL]
       🔗 Websites: [Site Name] - https://[full URL]
       💻 Tools: [Tool Name] - https://[full URL]
       📱 Apps: [App Name] - https://[full URL]
    6. ADVANCED TIPS - Expert-level insights and advanced techniques
    7. TIME COMMITMENT - Estimate how long to implement or learn
    8. NEXT STEPS - 2-3 specific actions they can take immediately
    
    Make responses comprehensive, educational, and actionable.
    Include specific URLs where relevant (no abbreviated links).
    Use 2-3 short response suggestions when appropriate.

# --- Text-to-Speech ---
tts:
  engine: "pyttsx3"           # "pyttsx3" (offline) or "gtts"
  rate: 160                   # Words per minute (pyttsx3)
  volume: 0.8                 # 0.0 to 1.0
  voice: null                 # null = system default

# --- Display / UI ---
display:
  enabled: true
  mode: "terminal"            # "terminal", "web", or "hdmi"
  web_port: 8080
  show_transcript: true
  show_suggestions: true
  max_suggestions: 3
  suggestion_display_time: 15 # Seconds to display each suggestion

# --- LED Feedback (ReSpeaker onboard LEDs) ---
leds:
  enabled: true
  listening_color: [0, 0, 255]     # Blue while listening
  processing_color: [255, 165, 0]  # Orange while processing
  ready_color: [0, 255, 0]         # Green when ready
  error_color: [255, 0, 0]         # Red on error
  brightness: 20                   # 0-31

# --- Logging ---
logging:
  level: "INFO"               # DEBUG, INFO, WARNING, ERROR
  file: "assistant.log"
  max_size_mb: 10
  backup_count: 3

max_history: 20  # Number of conversation turns to keep in context (default: 10)
